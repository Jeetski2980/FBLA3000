<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Button Demo</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .btn {
            position: relative;
            padding: 16px 36px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3), 0 4px 6px -2px rgba(99, 102, 241, 0.1);
            outline: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Hover Animation */
        .btn:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4), 0 10px 10px -5px rgba(99, 102, 241, 0.1);
        }

        /* Click Animation */
        .btn:active {
            transform: translateY(-1px) scale(0.98);
        }

        /* Ripple Effect */
        .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-effect 0.6s linear;
            pointer-events: none;
            width: 100px;
            height: 100px;
            margin-left: -50px;
            margin-top: -50px;
        }

        @keyframes ripple-effect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* Popup Message */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: #1e293b;
            color: #f8fafc;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 640px) {
            .btn {
                padding: 14px 28px;
                font-size: 16px;
                width: 80%;
            }
        }
    </style>
</head>
<body>

    <button class="btn" id="mainBtn">
        Launch Interaction
    </button>

    <div id="toast" class="toast">
        <span>Success! Interaction triggered 🚀</span>
    </div>

    <script>
        const btn = document.getElementById('mainBtn');
        const toast = document.getElementById('toast');

        btn.addEventListener('click', function(e) {
            // 1. Create Ripple
            const ripple = document.createElement('span');
            ripple.classList.add('ripple');
            this.appendChild(ripple);

            const rect = this.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ripple.style.left = `${x}px`;
            ripple.style.top = `${y}px`;

            // Clean up ripple
            setTimeout(() => {
                ripple.remove();
            }, 600);

            // 2. Show Toast
            toast.classList.add('show');
            
            // Auto hide toast
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        });
    </script>
</body>
</html>
